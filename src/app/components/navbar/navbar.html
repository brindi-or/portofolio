<nav [class.isScroll]="isScroll">
    <div class="nav-logo">
        <span class="logo"></span>
        <span class="logo-dot1"></span>
        <span class="logo-dot2"></span>
        <span class="logo-dot3"></span>
    </div>
    <ul class="nav-links">
        <li><a href="#about">{{ i18n.t('nav.about') }}</a></li>
        <li><a href="#skills">{{ i18n.t('nav.skills') }}</a></li>
        <!-- <li><a href="#projects">Projects</a></li> -->
        <li><a href="#pictures">{{ i18n.t('nav.pictures') }}</a></li>
        <li><a href="#contact">{{ i18n.t('nav.contact') }}</a></li>
    </ul>
    <button class="lang-switch" type="button" (click)="i18n.toggle()"
            [attr.aria-label]="'Switch language'">
        <span [class.active]="i18n.lang() === 'en'">EN</span>
        <span class="sep">/</span>
        <span [class.active]="i18n.lang() === 'fr'">FR</span>
    </button>
    <button class="hamburger" (click)="toggleMenu()">
        <span class="bar"></span>
        <span class="bar"></span>
        <span class="bar"></span>
    </button>

    <div class="mobile-menu" [class.open]="menuOpen">
        <ul>
            <li><a href="#about" (click)="toggleMenu()">{{ i18n.t('nav.about') }}</a></li>
            <li><a href="#skills" (click)="toggleMenu()">{{ i18n.t('nav.skills') }}</a></li>
            <!-- <li><a href="#projects">Projects</a></li> -->
            <li><a href="#pictures" (click)="toggleMenu()">{{ i18n.t('nav.pictures') }}</a></li>
            <li><a href="#contact" (click)="toggleMenu()">{{ i18n.t('nav.contact') }}</a></li>
            <li>
                <button class="lang-switch mobile" type="button" (click)="i18n.toggle()">
                    <span [class.active]="i18n.lang() === 'en'">EN</span>
                    <span class="sep">/</span>
                    <span [class.active]="i18n.lang() === 'fr'">FR</span>
                </button>
            </li>
        </ul>
    </div>
</nav>
