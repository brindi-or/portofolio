<section id="contact">
  <div class="contact-inner">
    <div class="contact-left">
      <span class="section-label">{{ i18n.t('contact.tag') }}</span>
      <h2 class="section-title">{{ i18n.t('contact.title1') }}<br><em>{{ i18n.t('contact.title2') }}</em></h2>
      <div class="gold-line"></div>
      <p>{{ i18n.t('contact.intro') }}</p>

      <div class="contact-cards">
        <a [href]="c.href" class="contact-card" *ngFor="let c of contacts">
          <span class="card-icon">{{ c.icon }}</span>
          <div>
            <span class="card-label">{{ c.labelKey ? i18n.t(c.labelKey) : c.label }}</span>
            <span class="card-val">{{ c.value }}</span>
          </div>
        </a>
      </div>
    </div>

    <div class="contact-right">
      <div class="success-msg" *ngIf="submitted; else formTpl">
        <span class="success-icon">&#10003;</span>
        <h3>{{ i18n.t('contact.thanks.title') }}</h3>
        <p>{{ i18n.t('contact.thanks.msg') }}</p>
        <button type="button" (click)="submitted=false">{{ i18n.t('contact.thanks.again') }}</button>
      </div>

      <ng-template #formTpl>
        <form #f="ngForm" (ngSubmit)="onSubmit()">
          <div class="form-row">
            <div class="form-group">
              <label for="cf-name">{{ i18n.t('contact.label.name') }}</label>
              <input id="cf-name" type="text" name="name" required maxlength="100" [(ngModel)]="formData.name" [disabled]="sending" />
            </div>
            <div class="form-group">
              <label for="cf-email">{{ i18n.t('contact.label.email') }}</label>
              <input id="cf-email" type="email" name="email" required maxlength="200" [(ngModel)]="formData.email" [disabled]="sending" />
            </div>
          </div>

          <div class="form-group">
            <label for="cf-subject">{{ i18n.t('contact.label.subject') }}</label>
            <input id="cf-subject" type="text" name="subject" required maxlength="200" [(ngModel)]="formData.subject" [disabled]="sending" />
          </div>

          <div class="form-group">
            <label for="cf-message">{{ i18n.t('contact.label.message') }}</label>
            <textarea id="cf-message" name="message" rows="6" required maxlength="5000" [(ngModel)]="formData.message" [disabled]="sending"></textarea>
          </div>

          <div #turnstileEl style="margin:0.25rem 0;"></div>

          <p class="form-error" *ngIf="errorMsg" style="color:#c0392b;margin:0;font-size:0.85rem;">{{ errorMsg }}</p>

          <button type="submit" class="submit-btn" [disabled]="sending || f.invalid">
            <span *ngIf="!sending">{{ i18n.t('contact.btn.send') }}</span>
            <span *ngIf="sending" class="sending-state">
              <span class="spinner" aria-hidden="true"></span>{{ i18n.t('contact.btn.sending') }}
            </span>
          </button>
        </form>
      </ng-template>
    </div>

  </div>
</section>
